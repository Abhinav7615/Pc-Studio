<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC Studio - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
        "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
        sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    p {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .info-box {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .info-box h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #60a5fa;
    }

    .info-box ul {
      text-align: left;
      list-style: none;
      font-size: 14px;
      color: #cbd5e1;
    }

    .info-box li {
      padding: 5px 0;
      display: flex;
      align-items: center;
    }

    .info-box li:before {
      content: "✓";
      color: #10b981;
      margin-right: 10px;
      font-weight: bold;
    }

    .button {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .button:hover {
      background: #2563eb;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📦</div>
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>PC Studio is currently unavailable because you're not connected to the internet.</p>

    <div class="info-box">
      <h2>What you can do:</h2>
      <ul>
        <li>Check your internet connection</li>
        <li>Try refreshing the page</li>
        <li>Browse previously loaded pages</li>
      </ul>
    </div>

    <button class="button" onclick="location.reload()">Retry Connection</button>

    <p style="margin-top: 30px; font-size: 12px; color: #64748b;">
      When your connection is restored, you'll be able to continue browsing.
    </p>
  </div>

  <script>
    window.addEventListener("online", () => {
      console.log("Connection restored");
      location.reload();
    });

    console.log("Offline page loaded - PC Studio PWA");
  </script>
</body>
</html>
